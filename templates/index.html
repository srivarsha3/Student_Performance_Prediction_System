<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🎓 Student Performance Predictor</h1>

    <form method="POST">

       <label>Study Hours</label>
<input type="number" name="hours" min="0" max="12" step="1" required>

<label>Attendance (%)</label>
<input type="number" name="attendance" min="0" max="100" step="1" required>

<label>Assignments Score</label>
<input type="number" name="assignments" min="0" max="10" step="1" required>

<label>Previous Marks</label>
<input type="number" name="previous_marks" min="0" max="100" step="1" required>

        <button type="submit">Predict Result</button>

    </form>

    {% if prediction is not none %}
    <div class="result">

        <h2>Prediction Result</h2>

        {% if prediction == 1 %}
        <p class="pass">✅ Student will PASS</p>
        {% else %}
        <p class="fail">❌ Student may FAIL</p>
        {% endif %}

        <p>Probability of Passing: <b>{{ (probability*100)|round(2) }}%</b></p>

    </div>
    {% endif %}

</div>

</body>
</html>
